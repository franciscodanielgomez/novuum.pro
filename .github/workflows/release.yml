# Release automático: cada push a main bumpea la versión patch, construye el MSI en Windows,
# crea un tag vX.Y.Z y publica el GitHub Release con .msi, .msi.sig y latest.json (updater).
# Para saltar un release puntual, agregar "[skip ci]" al commit message.
name: Release Tauri (Windows MSI)

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    # Defensa adicional: GITHUB_TOKEN ya no re-dispara workflows, pero por si alguien
    # pushea un cambio que no debería triggerear release, soportamos el marcador estándar.
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump patch version
        id: bump
        shell: pwsh
        run: |
          $conf = Get-Content src-tauri/tauri.conf.json -Raw | ConvertFrom-Json
          $current = $conf.version
          $parts = $current.Split('.')
          $newPatch = [int]$parts[2] + 1
          $newVersion = "$($parts[0]).$($parts[1]).$newPatch"
          $tag = "v$newVersion"
          Write-Host "Bumping $current -> $newVersion (tag: $tag)"

          # tauri.conf.json: reemplazo literal del par "version": "X.Y.Z"
          $text = Get-Content src-tauri/tauri.conf.json -Raw
          $text = $text.Replace("`"version`": `"$current`"", "`"version`": `"$newVersion`"")
          [System.IO.File]::WriteAllText("$PWD/src-tauri/tauri.conf.json", $text)

          # Cargo.toml: la línea `version = "X.Y.Z"` solo aparece para el package "novum"
          $text = Get-Content src-tauri/Cargo.toml -Raw
          $text = $text.Replace("version = `"$current`"", "version = `"$newVersion`"")
          [System.IO.File]::WriteAllText("$PWD/src-tauri/Cargo.toml", $text)

          # Cargo.lock: solo el bloque de novum, identificado por el name justo antes
          $text = Get-Content src-tauri/Cargo.lock -Raw
          $pattern = '(\[\[package\]\]\r?\nname = "novum"\r?\nversion = )"[^"]+"'
          $replacement = '$1"' + $newVersion + '"'
          $text = $text -replace $pattern, $replacement
          [System.IO.File]::WriteAllText("$PWD/src-tauri/Cargo.lock", $text)

          echo "version=$newVersion" >> $env:GITHUB_OUTPUT
          echo "tag=$tag" >> $env:GITHUB_OUTPUT

      - name: Verificar secreto de firma (TAURI_PRIVATE_KEY)
        run: |
          if (-not $env:TAURI_SIGNING_PRIVATE_KEY) {
            Write-Error "Falta el secreto TAURI_PRIVATE_KEY. En el repo: Settings → Secrets and variables → Actions → New repository secret. Nombre: TAURI_PRIVATE_KEY. Valor: pegar todo el bloque 'Private' que muestra 'npx tauri signer generate' (puede ser varias lineas)."
            exit 1
          }
          echo "Secreto TAURI_PRIVATE_KEY configurado."
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: 'src-tauri -> target'

      - name: Install dependencies
        run: npm ci

      - name: Run check (types/lint)
        run: npm run check

      - name: Generar íconos (PNG desde SVG, luego Tauri)
        run: |
          npm run icons:generate
          npm run desktop:icons

      - name: Build Tauri (MSI + updater artifacts)
        run: |
          # Normalizar clave: quitar guiones/espacios al pegar y dejar todo en UNA linea (el decoder falla con saltos de linea o caracteres extra)
          $raw = $env:TAURI_SIGNING_PRIVATE_KEY
          $key = $raw.Trim() -replace '^[\s\-]+|[\s\-]+$', '' -replace "`r`n|`n|`r", ''
          $env:TAURI_SIGNING_PRIVATE_KEY = $key
          npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
          # Supabase: sin estas variables el build queda sin backend y la app muestra "500 Internal Error" al abrir
          PUBLIC_SUPABASE_URL: ${{ secrets.PUBLIC_SUPABASE_URL }}
          PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.PUBLIC_SUPABASE_ANON_KEY }}

      - name: Generate latest.json for updater
        id: updater
        shell: pwsh
        run: |
          $version = "${{ steps.bump.outputs.version }}"
          $tag = "${{ steps.bump.outputs.tag }}"
          $msiDir = "src-tauri/target/release/bundle/msi"
          $msi = Get-ChildItem -Path $msiDir -Filter "*.msi" | Select-Object -First 1
          if (-not $msi) { Write-Error "No .msi found in $msiDir"; exit 1 }
          $sigPath = "$($msi.FullName).sig"
          if (-not (Test-Path $sigPath)) { Write-Error "No .sig found for $($msi.Name)"; exit 1 }
          $signature = Get-Content $sigPath -Raw
          $baseUrl = "https://github.com/${{ github.repository }}/releases/download/$tag"
          $msiNameEncoded = [System.Uri]::EscapeDataString($msi.Name)
          $url = "$baseUrl/$msiNameEncoded"
          $json = @{
            version = $version
            notes = ""
            pub_date = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")
            platforms = @{
              "windows-x86_64" = @{
                url = $url
                signature = $signature.Trim()
              }
            }
          } | ConvertTo-Json -Depth 4 -Compress
          $json | Set-Content -Path "$msiDir/latest.json" -Encoding utf8NoBOM
          echo "msi_name=$($msi.Name)" >> $env:GITHUB_OUTPUT

      - name: Commit version bump and create tag
        shell: pwsh
        run: |
          git config user.email "fdgomez94@gmail.com"
          git config user.name "Francisco Daniel Gomez"
          git add src-tauri/tauri.conf.json src-tauri/Cargo.toml src-tauri/Cargo.lock
          git commit -m "chore: bump version to ${{ steps.bump.outputs.version }} [skip ci]"
          git push origin HEAD:main
          git tag ${{ steps.bump.outputs.tag }}
          git push origin ${{ steps.bump.outputs.tag }}

      - name: Create Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.bump.outputs.tag }}
          name: ${{ steps.bump.outputs.tag }}
          body: |
            Instalador Windows (MSI) para Novum POS.
            Descargar el archivo `.msi` y ejecutarlo para instalar.
          draft: false
          files: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/msi/*.msi.sig
            src-tauri/target/release/bundle/msi/latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
